<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Coming Back Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg:      #0f0f18;
      --bg2:     #161622;
      --surface: #1c1c2a;
      --card:    #21212f;
      --border:  #2a2a3d;
      --p1:      #a78bfa;
      --p2:      #818cf8;
      --p3:      #6ee7b7;
      --acc:     #f472b6;
      --text:    #eeeeff;
      --mid:     #8080a8;
      --dim:     #44445a;
      --f:       'Syne', sans-serif;
      --m:       'JetBrains Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--f);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Background glow */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 70% 50% at 20% -10%, rgba(167,139,250,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 55% 45% at 80% 110%, rgba(244,114,182,0.08) 0%, transparent 60%);
    }

    /* Animated center glow */
    .glow-orb {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 600px; height: 600px;
      background: radial-gradient(ellipse, rgba(167,139,250,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: breathe 7s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity: 0.5; transform: translate(-50%,-50%) scale(1); }
      50%      { opacity: 1;   transform: translate(-50%,-50%) scale(1.1); }
    }

    /* Grain texture */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
    }

    /* ── WRAPPER ── */
    .wrapper {
      position: relative; z-index: 1;
      text-align: center;
      padding: 2rem 1.5rem;
      width: 100%; max-width: 520px;
      animation: fadeUp 1s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── LOGO ICON ── */
    .logo-icon {
      width: 48px; height: 48px; border-radius: 14px;
      background: linear-gradient(135deg, var(--p1), var(--acc));
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin: 0 auto 1.6rem;
      box-shadow: 0 0 28px rgba(167,139,250,0.3);
      animation: fadeUp 1s 0.05s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── EYEBROW ── */
    .eyebrow {
      font-family: var(--m);
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--p1);
      margin-bottom: 1rem;
      opacity: 0.8;
      animation: fadeUp 1s 0.1s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── HEADLINE ── */
    h1 {
      font-size: clamp(1.9rem, 7vw, 3.2rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 0.5rem;
      animation: fadeUp 1s 0.15s cubic-bezier(.22,1,.36,1) both;
    }
    h1 .hl {
      background: linear-gradient(90deg, var(--p1), var(--acc));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-family: var(--m);
      font-size: 0.7rem;
      color: var(--mid);
      letter-spacing: 0.1em;
      margin-bottom: 2.8rem;
      animation: fadeUp 1s 0.2s cubic-bezier(.22,1,.36,1) both;
    }

    /* ── COUNTDOWN BOXES ── */
    .countdown {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 2.2rem;
      animation: fadeUp 1s 0.25s cubic-bezier(.22,1,.36,1) both;
    }

    .unit { display: flex; flex-direction: column; align-items: center; gap: 7px; flex: 1; }

    .box {
      width: 100%; max-width: 110px;
      aspect-ratio: 1 / 1.05;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
      box-shadow: 0 0 0 0 rgba(167,139,250,0);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .box::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(167,139,250,0.25), transparent);
    }
    .box::after {
      content: '';
      position: absolute; top: 50%; left: 0; right: 0; height: 1px;
      background: rgba(255,255,255,0.04);
    }
    .box:hover { border-color: rgba(167,139,250,0.35); box-shadow: 0 0 24px rgba(167,139,250,0.08); }

    .num {
      font-family: var(--m);
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      font-weight: 700;
      color: var(--text);
      text-shadow: 0 0 20px rgba(167,139,250,0.35);
      line-height: 1;
    }
    .num.tick { animation: tick 0.25s ease; }
    @keyframes tick {
      0%   { opacity: 0; transform: translateY(-6px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .lbl {
      font-family: var(--m);
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--dim);
    }

    /* ── PROGRESS ── */
    .progress-wrap {
      margin: 0 auto 1.6rem;
      animation: fadeUp 1s 0.3s cubic-bezier(.22,1,.36,1) both;
    }
    .progress-header {
      display: flex; justify-content: space-between;
      font-family: var(--m); font-size: 0.6rem;
      color: var(--dim); margin-bottom: 7px;
    }
    .progress-header span:last-child { color: var(--p1); }
    .progress-track {
      height: 3px; background: var(--bg2);
      border-radius: 99px; overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--p1), var(--acc));
      border-radius: 99px;
      transition: width 1s linear;
      box-shadow: 0 0 8px rgba(167,139,250,0.4);
      width: 0%;
    }

    /* ── RETURN DATE ── */
    .return-info {
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      font-family: var(--m); font-size: 0.65rem;
      color: var(--mid);
      animation: fadeUp 1s 0.35s cubic-bezier(.22,1,.36,1) both;
    }
    .return-info .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--p3);
      box-shadow: 0 0 6px var(--p3);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .return-info span.date { color: var(--p2); }

    /* ── SYNC STATUS ── */
    .sync-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--m); font-size: 0.55rem;
      letter-spacing: 0.15em;
      color: var(--dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      margin-top: 1.4rem;
      animation: fadeUp 1s 0.4s cubic-bezier(.22,1,.36,1) both;
    }
    .sync-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--dim);
      transition: background 0.4s;
    }
    .sync-dot.synced  { background: var(--p3); box-shadow: 0 0 5px var(--p3); }
    .sync-dot.syncing { background: var(--acc); animation: blink 1s infinite; }

    /* ── DONE STATE ── */
    #done-state {
      display: none;
      animation: fadeUp 1s ease both;
    }
    #done-state h2 {
      font-size: clamp(1.8rem, 6vw, 3rem);
      font-weight: 800;
      background: linear-gradient(90deg, var(--p3), var(--p1));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    #done-state p {
      font-family: var(--m); font-size: 0.7rem;
      color: var(--mid); letter-spacing: 0.1em;
    }

    /* ── LOADING ── */
    #loading {
      font-family: var(--m); font-size: 0.65rem;
      color: var(--dim); letter-spacing: 0.2em;
    }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--p1);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 400px) {
      .countdown { gap: 7px; }
      .box { border-radius: 10px; }
    }

    /* ══════════════════════════════════════
       WALKING PROGRESS STRIP (bottom)
    ══════════════════════════════════════ */
    .walk-section {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 0 0 0 0;
      animation: fadeUp 1s 0.5s cubic-bezier(.22,1,.36,1) both;
    }

    /* Labels row */
    .walk-labels {
      display: flex; justify-content: space-between;
      padding: 0 16px 6px;
      font-family: var(--m); font-size: 0.55rem;
      letter-spacing: 0.18em; color: var(--dim);
    }
    .walk-labels .pct-lbl { color: var(--p1); }

    /* The road/track */
    .walk-track {
      position: relative;
      height: 64px;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      overflow: hidden;
    }

    /* Filled portion */
    .walk-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 0%;
      background: linear-gradient(90deg, rgba(167,139,250,0.12), rgba(244,114,182,0.10));
      transition: width 1s linear;
    }

    /* Road line (dashed center line) */
    .walk-track::before {
      content: '';
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 2px;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px, transparent 12px,
        rgba(255,255,255,0.04) 12px, rgba(255,255,255,0.04) 24px
      );
      transform: translateY(-50%);
    }

    /* Progress glowing line at top of track */
    .walk-glow-line {
      position: absolute;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, var(--p1), var(--acc));
      box-shadow: 0 0 10px rgba(167,139,250,0.6);
      transition: width 1s linear;
    }

    /* START flag */
    .flag-start, .flag-end {
      position: absolute;
      bottom: 8px;
      display: flex; flex-direction: column; align-items: center;
      gap: 2px; z-index: 3;
    }
    .flag-start { left: 10px; }
    .flag-end   { right: 10px; }
    .flag-pole {
      width: 2px; height: 18px;
      background: var(--dim);
      border-radius: 1px;
    }
    .flag-flag {
      width: 14px; height: 9px;
      border-radius: 2px;
      font-size: 8px;
      display: flex; align-items: center; justify-content: center;
      position: absolute;
      top: 0; left: 3px;
    }
    .flag-start .flag-flag { background: rgba(167,139,250,0.3); }
    .flag-end   .flag-flag { background: rgba(110,231,183,0.3); }

    /* ── CARTOON WALKER ── */
    .walker {
      position: absolute;
      bottom: 10px;
      /* left is set by JS */
      left: 0%;
      transform: translateX(-50%);
      width: 32px;
      height: 44px;
      z-index: 5;
      transition: left 1s linear;
    }

    /* SVG inside walker */
    .walker svg {
      width: 100%; height: 100%;
      overflow: visible;
    }

    /* HEAD bob */
    .walker-head {
      animation: headBob 0.5s ease-in-out infinite alternate;
      transform-origin: 16px 8px;
    }
    @keyframes headBob {
      from { transform: translateY(0px); }
      to   { transform: translateY(1.5px); }
    }

    /* BODY */
    .walker-body { }

    /* ARM swing */
    .arm-left {
      transform-origin: 16px 18px;
      animation: armL 0.5s ease-in-out infinite alternate;
    }
    .arm-right {
      transform-origin: 16px 18px;
      animation: armR 0.5s ease-in-out infinite alternate;
    }
    @keyframes armL {
      from { transform: rotate(-30deg); }
      to   { transform: rotate(30deg); }
    }
    @keyframes armR {
      from { transform: rotate(30deg); }
      to   { transform: rotate(-30deg); }
    }

    /* LEG swing */
    .leg-left {
      transform-origin: 16px 28px;
      animation: legL 0.5s ease-in-out infinite alternate;
    }
    .leg-right {
      transform-origin: 16px 28px;
      animation: legR 0.5s ease-in-out infinite alternate;
    }
    @keyframes legL {
      from { transform: rotate(-28deg); }
      to   { transform: rotate(28deg); }
    }
    @keyframes legR {
      from { transform: rotate(28deg); }
      to   { transform: rotate(-28deg); }
    }

    /* Tiny shadow under walker */
    .walker-shadow {
      position: absolute;
      bottom: 6px;
      left: 50%; transform: translateX(-50%);
      width: 18px; height: 4px;
      background: rgba(167,139,250,0.25);
      border-radius: 50%;
      filter: blur(3px);
      animation: shadowPulse 0.5s ease-in-out infinite alternate;
    }
    @keyframes shadowPulse {
      from { width: 18px; opacity: 0.3; }
      to   { width: 14px; opacity: 0.15; }
    }

    /* Speech bubble */
    .walker-bubble {
      position: absolute;
      bottom: 52px;
      left: 50%; transform: translateX(-50%);
      background: var(--card);
      border: 1px solid rgba(167,139,250,0.3);
      border-radius: 8px;
      padding: 3px 7px;
      font-family: var(--m); font-size: 0.5rem;
      color: var(--p1); white-space: nowrap;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }
    .walker-bubble::after {
      content: '';
      position: absolute;
      top: 100%; left: 50%; transform: translateX(-50%);
      border: 4px solid transparent;
      border-top-color: rgba(167,139,250,0.3);
    }
    .walker-bubble.show { opacity: 1; }

  </style>
</head>
<body>
<div class="glow-orb"></div>

<div class="wrapper">
  <div class="logo-icon">🧬</div>
  <div class="eyebrow">— temporary break —</div>

  <h1>Will Be Back<br><span class="hl">After 30 Days</span></h1>
  <p class="tagline">the site is offline · timer synced across all devices</p>

  <!-- Loading state -->
  <div id="loading"><span class="spinner"></span>syncing timer...</div>

  <!-- Main countdown (hidden until loaded) -->
  <div id="main-content" style="display:none; padding-bottom: 72px;">
    <div class="countdown">
      <div class="unit">
        <div class="box"><span class="num" id="d">00</span></div>
        <span class="lbl">Days</span>
      </div>
      <div class="unit">
        <div class="box"><span class="num" id="h">00</span></div>
        <span class="lbl">Hours</span>
      </div>
      <div class="unit">
        <div class="box"><span class="num" id="m">00</span></div>
        <span class="lbl">Mins</span>
      </div>
      <div class="unit">
        <div class="box"><span class="num" id="s">00</span></div>
        <span class="lbl">Secs</span>
      </div>
    </div>

    <div class="return-info">
      <div class="dot"></div>
      <span>Expected return on</span>
      <span class="date" id="ret-date">—</span>
    </div>

    <div class="sync-badge">
      <div class="sync-dot syncing" id="sync-dot"></div>
      <span id="sync-txt">CONNECTING...</span>
    </div>
  </div>

  <!-- Done state -->
  <div id="done-state">
    <h2>We're Back! 🎉</h2>
    <p>the wait is over · thank you for your patience</p>
  </div>
</div>

<!-- ══ WALKING PROGRESS STRIP ══ -->
<div class="walk-section" id="walk-section" style="display:none;">
  <div class="walk-labels">
    <span>DAY 0</span>
    <span class="pct-lbl" id="walk-pct">0.0% walked</span>
    <span>DAY 30</span>
  </div>
  <div class="walk-track">
    <div class="walk-fill"    id="walk-fill"></div>
    <div class="walk-glow-line" id="walk-glow"></div>

    <!-- Start flag -->
    <div class="flag-start">
      <div class="flag-flag">🚩</div>
      <div class="flag-pole"></div>
    </div>

    <!-- End flag -->
    <div class="flag-end">
      <div class="flag-flag">🏁</div>
      <div class="flag-pole"></div>
    </div>

    <!-- Walking cartoon -->
    <div class="walker" id="walker">
      <div class="walker-bubble" id="bubble">almost there!</div>
      <div class="walker-shadow"></div>
      <svg viewBox="0 0 32 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- HEAD -->
        <g class="walker-head">
          <circle cx="16" cy="7" r="5.5" fill="#a78bfa" stroke="#c4b5fd" stroke-width="1"/>
          <!-- eyes -->
          <circle cx="14" cy="6.5" r="1" fill="#0f0f18"/>
          <circle cx="18" cy="6.5" r="1" fill="#0f0f18"/>
          <!-- smile -->
          <path d="M13.5 9 Q16 11 18.5 9" stroke="#0f0f18" stroke-width="0.8" stroke-linecap="round" fill="none"/>
        </g>

        <!-- BODY -->
        <g class="walker-body">
          <line x1="16" y1="12.5" x2="16" y2="28" stroke="#c4b5fd" stroke-width="2" stroke-linecap="round"/>
        </g>

        <!-- ARMS -->
        <g class="arm-left">
          <line x1="16" y1="17" x2="8"  y2="23" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round"/>
        </g>
        <g class="arm-right">
          <line x1="16" y1="17" x2="24" y2="23" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round"/>
        </g>

        <!-- LEGS -->
        <g class="leg-left">
          <line x1="16" y1="28" x2="10" y2="38" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
          <!-- shoe -->
          <ellipse cx="9.5" cy="38.5" rx="3" ry="1.5" fill="#6366f1"/>
        </g>
        <g class="leg-right">
          <line x1="16" y1="28" x2="22" y2="38" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
          <!-- shoe -->
          <ellipse cx="22.5" cy="38.5" rx="3" ry="1.5" fill="#6366f1"/>
        </g>
      </svg>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp }              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyBvKTFKyJHfJ43k-IjZTOX6pe6dHa8zoEg",
    authDomain:        "biology-pyq.firebaseapp.com",
    databaseURL:       "https://biology-pyq-default-rtdb.firebaseio.com",
    projectId:         "biology-pyq",
    storageBucket:     "biology-pyq.firebasestorage.app",
    messagingSenderId: "560990492334",
    appId:             "1:560990492344:web:feb240f904f330d537bf3f"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const timerRef = ref(db, 'siteDown/startTime');

  const DURATION = 30 * 24 * 60 * 60 * 1000; // 30 days in ms

  let startTime = null;
  const prev = {};

  function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

  function setNum(id, val) {
    const el = document.getElementById(id);
    if (prev[id] !== val) {
      el.classList.remove('tick');
      void el.offsetWidth;
      el.classList.add('tick');
      el.textContent = val;
      prev[id] = val;
    }
  }

  let bubbleTimer = null;

  function tick() {
    if (!startTime) return;
    const now       = Date.now();
    const remaining = (startTime + DURATION) - now;

    if (remaining <= 0) {
      document.getElementById('main-content').style.display = 'none';
      document.getElementById('done-state').style.display   = 'block';
      document.getElementById('walk-section').style.display = 'none';
      return;
    }

    const totalSecs = remaining / 1000;
    setNum('d', pad(totalSecs / 86400));
    setNum('h', pad((totalSecs % 86400) / 3600));
    setNum('m', pad((totalSecs % 3600)  / 60));
    setNum('s', pad(totalSecs % 60));

    const elapsed = Math.min(((now - startTime) / DURATION) * 100, 100);

    // Walker
    const walkerEl = document.getElementById('walker');
    const fillEl   = document.getElementById('walk-fill');
    const glowEl   = document.getElementById('walk-glow');
    const pctEl    = document.getElementById('walk-pct');
    const bubbleEl = document.getElementById('bubble');

    const walkerPct = Math.min(Math.max(elapsed, 2), 96);
    walkerEl.style.left = walkerPct + '%';
    fillEl.style.width  = walkerPct + '%';
    glowEl.style.width  = walkerPct + '%';
    pctEl.textContent   = elapsed.toFixed(1) + '% walked';

    if (elapsed > 80 && !bubbleEl.classList.contains('show')) {
      bubbleEl.textContent = 'almost there!';
      bubbleEl.classList.add('show');
    } else if (elapsed > 50 && elapsed <= 80 && Math.random() < 0.002) {
      bubbleEl.textContent = 'keep waiting…';
      bubbleEl.classList.add('show');
      clearTimeout(bubbleTimer);
      bubbleTimer = setTimeout(() => bubbleEl.classList.remove('show'), 2500);
    }
  }

  function showSynced() {
    const dot = document.getElementById('sync-dot');
    const txt = document.getElementById('sync-txt');
    dot.classList.remove('syncing');
    dot.classList.add('synced');
    txt.textContent = 'SYNCED VIA FIREBASE';
  }

  function showContent() {
    document.getElementById('loading').style.display      = 'none';
    document.getElementById('main-content').style.display = 'block';
    document.getElementById('walk-section').style.display = 'block';

    // Set return date label
    const returnDate = new Date(startTime + DURATION);
    document.getElementById('ret-date').textContent = returnDate.toLocaleDateString('en-IN', {
      weekday: 'short', day: 'numeric', month: 'long', year: 'numeric'
    });

    tick();
    setInterval(tick, 1000);
    showSynced();
  }

  // ── MAIN INIT ──
  try {
    const snap = await get(timerRef);

    if (snap.exists()) {
      // Timer already set — use the same start for all devices
      startTime = snap.val();
    } else {
      // First device ever — set the start time now
      startTime = Date.now();
      await set(timerRef, startTime);
    }

    showContent();
  } catch (err) {
    // Firebase failed — fallback to localStorage so page still works
    console.warn('Firebase error, falling back to localStorage:', err);
    const lsKey = 'site_down_start_v1';
    let stored = localStorage.getItem(lsKey);
    if (!stored) { stored = Date.now(); localStorage.setItem(lsKey, stored); }
    startTime = Number(stored);

    const dot = document.getElementById('sync-dot');
    document.getElementById('sync-txt').textContent = 'OFFLINE (local timer)';

    showContent();
  }
</script>
</body>
</html>
